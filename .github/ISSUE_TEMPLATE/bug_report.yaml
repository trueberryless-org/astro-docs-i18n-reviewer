name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report! Please fill in as much detail as possible.

  - type: input
    id: pr-url
    attributes:
      label: PR URL
      description: The GitHub PR URL you were reviewing when the bug occurred
      placeholder: https://github.com/withastro/docs/pull/1234
    validations:
      required: false

  - type: dropdown
    id: locale
    attributes:
      label: Language / locale
      options:
        - ar (Arabic)
        - de (German)
        - fr (French)
        - it (Italian)
        - ja (Japanese)
        - ko (Korean)
        - pt-br (Portuguese — Brazil)
        - ru (Russian)
        - zh-cn (Simplified Chinese)
        - zh-tw (Traditional Chinese)
        - Not locale-specific
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app at https://astro-docs-i18n-reviewer.trueberryless.org
        2. Paste PR URL …
        3. …

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser console errors, screenshots, etc.
